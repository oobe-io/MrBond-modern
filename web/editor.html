<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MrBond-modern Editor</title>
    <style>
      :root {
        --bg: #0f1115;
        --fg: #e8eaee;
        --muted: #9aa0a6;
        --accent: #6ee7b7;
        --panel: #181c23;
        --border: #2a2f38;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        height: 100%;
        background: var(--bg);
        color: var(--fg);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', 'Yu Gothic', sans-serif;
        overflow: hidden;
      }
      #app {
        display: grid;
        grid-template-columns: auto 1fr auto;
        grid-template-rows: 48px 1fr;
        height: 100vh;
        gap: 0;
      }
      header {
        grid-column: 1 / 4;
        display: flex;
        align-items: center;
        padding: 0 1rem;
        border-bottom: 1px solid var(--border);
        background: var(--panel);
      }
      header h1 {
        margin: 0;
        font-size: 1.05rem;
        color: var(--accent);
        font-weight: 600;
      }
      header .spacer { flex: 1; }
      header .status {
        color: var(--muted);
        font-size: 0.85rem;
        font-family: 'SF Mono', Monaco, monospace;
      }
      #toolbar-root {
        grid-row: 2;
        grid-column: 1;
        border-right: 1px solid var(--border);
      }
      #canvas-root {
        grid-row: 2;
        grid-column: 2;
        position: relative;
        overflow: hidden;
      }
      #inspector {
        grid-row: 2;
        grid-column: 3;
        width: 280px;
        border-left: 1px solid var(--border);
        background: var(--panel);
        padding: 1rem;
        overflow-y: auto;
      }
      #inspector h2 {
        margin: 0 0 0.6rem;
        font-size: 0.9rem;
        color: var(--fg);
      }
      #inspector .hint {
        color: var(--muted);
        font-size: 0.8rem;
      }
      #inspector pre {
        font-size: 0.75rem;
        background: var(--bg);
        padding: 0.6rem;
        border-radius: 4px;
        overflow-x: auto;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <div id="app">
      <header>
        <h1>MrBond-modern Editor</h1>
        <div class="spacer"></div>
        <div class="status" id="status">Ready</div>
        <div id="io-buttons" style="margin-left: 1rem;"></div>
        <button id="run-btn" style="margin-left: 0.5rem; background: #6ee7b7; color: #0a0e14; border: none; padding: 0.4rem 0.8rem; border-radius: 4px; font-weight: 600; cursor: pointer; font-size: 0.85rem;">▶ Run</button>
      </header>
      <div id="toolbar-root"></div>
      <div id="canvas-root"></div>
      <aside id="inspector">
        <h2>Inspector</h2>
        <div class="hint" id="inspector-body">
          要素を選択するとここに情報が表示されます。
        </div>
      </aside>
    </div>
    <script type="module" src="./editor/main.ts"></script>
  </body>
</html>
